<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Timetable Scheduler</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/CSS/style.css">
</head>
<body class="dark-portal login-page">
    <div class="login-wrapper">
        <div class="login-card">
            <h1>Smart Timetable Scheduler</h1>
            <p class="subtitle">Intelligent Academic Scheduling with Machine Learning</p>

            <div id="login-alert"></div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Enter username" autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Enter password">
                    <label class="password-toggle">
                        <input type="checkbox" onclick="toggleLoginPassword(this)">
                        <span>View password</span>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>

            <p class="text-center text-muted mt-2" style="font-size:0.8rem;">
                Default: username / password
            </p>
        </div>
    </div>
    <script src="/static/JS/app.js"></script>
</body>
</html>
