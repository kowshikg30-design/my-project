<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartClass</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f7fb;
      color: #1f2937;
    }
    .card {
      width: min(92vw, 520px);
      background: #ffffff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    p {
      margin: 0 0 20px;
      color: #4b5563;
    }
    a.btn {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
    }
    a.btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>SmartClass Timetable Scheduler</h1>
    <p>Manage classes, faculty, and timetables in one place.</p>
    <a class="btn" href="/login">Go to Login</a>
  </main>
</body>
</html>
